name: Linux Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许在 GitHub 网页端手动触发
  workflow_dispatch:

jobs:
  build-and-test:
    # runs-on: ubuntu-22.04 # 对应 XRootD 官方支持的版本
    # runs-on: ubuntu-latest
    runs-on: macos-latest

    container:
      image: node:20-bullseye
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Cache XRootD Build
      id: cache-xrootd
      uses: actions/cache/restore@v5
      with:
        path: deps/xrootd
        key: linux20-xrootd-v6.0.1-dynamic-b2 # ubuntu-20, build 2

    - name: Install System Dependencies for XRootD
      if: steps.cache-xrootd.outputs.cache-hit != 'true'
      run: |
        apt-get update
        apt-get install -y cmake g++ make patchelf
      
    - name: Install System Dependencies for XRootD
      if: steps.cache-xrootd.outputs.cache-hit == 'true'
      run: |
        apt-get update
        apt-get install -y patchelf

    - name: Build XRootD Static Libraries
      # 只有当没有命中缓存时，才执行耗时的克隆和编译
      if: steps.cache-xrootd.outputs.cache-hit != 'true'
      run: |
        echo "Cache miss. Building XRootD from source..."
        git clone --depth 1 --branch v6.0.1 https://github.com/xrootd/xrootd.git xrootd-src
        mkdir xrootd-src/build && cd xrootd-src/build/
        
        cmake .. \
          -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/deps/xrootd \
          -DXRDCL_ONLY=ON \
          -DENABLE_SERVER=OFF \
          -DENABLE_PYTHON=OFF \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          
        cmake --build . --parallel
        cmake --install .

        # 编译完成后清理源码，节省缓存空间
        cd ../..
        rm -rf xrootd-src
        
        # 进入你的库目录
        cd deps/xrootd/lib

        # 剥离所有 .so 文件的调试信息和非导出符号
        # 注意：这不会影响动态链接的运行，只会让文件变小
        strip --strip-unneeded *.so

        ls -lh # log info

    - name: Save Cached XRootD Build
      if: steps.cache-xrootd.outputs.cache-hit != 'true'
      id: cache-xrootd-save
      uses: actions/cache/save@v5
      with:
        path: deps/xrootd
        key: ${{ steps.cache-xrootd.outputs.cache-primary-key }}

    - name: Copy dynamic libs To distributed libs folder
      run: |
        mkdir -p libs/linux-x64
        # 只复制一份实体文件，去纹身、去版本号
        # 1. 强行把它们自身的 SONAME 改为不带版本号的名字
        # 1. 客户端核心基础库
        cp deps/xrootd/lib/libXrdCl.so.6.0.1     libs/linux-x64/libXrdCl.so.6
        cp deps/xrootd/lib/libXrdUtils.so.6.0.1  libs/linux-x64/libXrdUtils.so.6
        cp deps/xrootd/lib/libXrdXml.so.6.0.1    libs/linux-x64/libXrdXml.so.6
        # 2. 密码学与安全框架核心
        cp deps/xrootd/lib/libXrdSec-6.so        libs/linux-x64/
        cp deps/xrootd/lib/libXrdSecProt-6.so    libs/linux-x64/
        cp deps/xrootd/lib/libXrdCrypto.so.6.0.1 libs/linux-x64/libXrdCrypto.so.6
        cp deps/xrootd/lib/libXrdCryptossl-6.so  libs/linux-x64/libXrdCryptossl-6.so
        # 3. 核心认证插件 (Auth Plugins)
        cp deps/xrootd/lib/libXrdSeckrb5-6.so    libs/linux-x64/
        cp deps/xrootd/lib/libXrdSecunix-6.so  libs/linux-x64/
        cp deps/xrootd/lib/libXrdSecsss-6.so    libs/linux-x64/
        cp deps/xrootd/lib/libXrdSecpwd-6.so    libs/linux-x64/
        cp deps/xrootd/lib/libXrdSecztn-6.so    libs/linux-x64/

        # 让该目录下所有的 .so 运行时都能在同级目录下找到彼此
        # 这条命令是 O(n) 的，无论增加多少个库，都只需要这一行！
        for f in libs/linux-x64/*.so*; do
          patchelf --set-rpath '$ORIGIN' "$f"
        done

    - name: Install pnpm (Compatible with Node 20)
      # 对于 Node 20，推荐使用 pnpm v9 系列
      run: npm install -g pnpm@9

    - name: Strip packageManager field for CI
      run: |
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json'));
          delete pkg.packageManager;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Successfully removed packageManager field for CI environment.');
        "

    - name: Install NPM Dependencies & Build TypeScript
      run: pnpm install

    - name: Build Node Addon (node-gyp)
      # 手动触发 C++ 扩展编译，使用刚刚编译好的 XRootD 静态库
      continue-on-error: true # 即使编译失败也继续执行后续步骤，方便调试
      run: |
        pnpm run build
        pnpm run pack

    - name: Upload Dist for Debugging
      uses: actions/upload-artifact@v6
      with:
        path: dist
        name: dist

    - name: Upload Prebuilds for Debugging
      uses: actions/upload-artifact@v6
      with:
        path: prebuilds
        name: prebuilds

    - name: Upload Package
      uses: actions/upload-artifact@v6
      with:
        path: packages
        name: node-addon-package

    # - name: Run Tests
    #   # 跑你的 Jest 测试用例
    #   run: pnpm test

    - name: Tree print package
      run: |
        cd packages
        for f in *.tgz; do tar -xvzf "$f"; done
        du -ah
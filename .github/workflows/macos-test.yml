name: macOS Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    if: contains(github.event.head_commit.message, '[macos]')
    # macos-15-intel 是 Intel x64, macos-14 是 M1 arm64
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            name: macos
            arch: x64
          - os: macos-14
            name: macos
            arch: arm64

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    # 替代 Linux 的 Container，直接在宿主机配置 Node.js
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Cache XRootD Build
      id: cache-xrootd
      uses: actions/cache/restore@v5
      with:
        path: deps/xrootd
        key: macos-${{ matrix.arch }}-xrootd-v6.0.1-dynamic-b3

    - name: Install System Dependencies for XRootD
      # Homebrew 默认已安装在 macOS runner 上
      run: |
        brew update
        # 必须安装 openssl@3，macOS 自带的 crypto 库编译 xrootd 时容易报错
        brew install cmake openssl@3
      
    - name: Build XRootD Dynamic Libraries
      if: steps.cache-xrootd.outputs.cache-hit != 'true'
      run: |
        echo "Cache miss. Building XRootD from source..."
        git clone --depth 1 --branch v6.0.1 https://github.com/xrootd/xrootd.git xrootd-src
        mkdir xrootd-src/build && cd xrootd-src/build/
        
        # 获取 OpenSSL 安装路径
        OPENSSL_ROOT=$(brew --prefix openssl@3)

        # macOS CMake 核心改动：
        # 1. 注入 OPENSSL_ROOT_DIR
        # 2. 注入 CMAKE_INSTALL_RPATH=@loader_path 替代后续的部分 patchelf 工作
        cmake .. \
          -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/deps/xrootd \
          -DXRDCL_ONLY=ON \
          -DENABLE_SERVER=OFF \
          -DENABLE_PYTHON=OFF \
          -DCMAKE_CXX_STANDARD=17 \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
          -DCMAKE_MACOSX_RPATH=ON \
          -DCMAKE_INSTALL_RPATH="@loader_path"
          
        cmake --build . --parallel $(sysctl -n hw.ncpu)
        cmake --install .

        # 清理源码
        cd ../..
        rm -rf xrootd-src
        
        cd deps/xrootd/lib

        # 同时 strip dylib 和 so 文件, -x 表示剥离非全局的局部符号, 
        strip -x *.dylib *.so 2>/dev/null || true

        ls -lh

    - name: Save Cached XRootD Build
      if: steps.cache-xrootd.outputs.cache-hit != 'true'
      id: cache-xrootd-save
      uses: actions/cache/save@v5
      with:
        path: deps/xrootd
        key: ${{ steps.cache-xrootd.outputs.cache-primary-key }}

    - name: Copy dynamic libs To distributed libs folder
      run: |
        TARGET_DIR="libs/macos-${{ matrix.arch }}"
        mkdir -p "$TARGET_DIR"
        
        # macOS 上的版本号通常在扩展名之前 (例如: libXrdCl.6.0.1.dylib)
        # 1. 客户端核心基础库 (编译链接用，dylib)
        cp deps/xrootd/lib/libXrdCl.6.0.1.dylib    "$TARGET_DIR/libXrdCl.6.dylib"
        cp deps/xrootd/lib/libXrdUtils.6.0.1.dylib "$TARGET_DIR/libXrdUtils.6.dylib"
        cp deps/xrootd/lib/libXrdXml.6.0.1.dylib   "$TARGET_DIR/libXrdXml.6.dylib"
        
        # 2. 密码学与安全框架核心 (插件架构，so)
        cp deps/xrootd/lib/libXrdSec-6.so          "$TARGET_DIR/"
        cp deps/xrootd/lib/libXrdSecProt-6.so      "$TARGET_DIR/"
        cp deps/xrootd/lib/libXrdCrypto.6.0.1.dylib  "$TARGET_DIR/libXrdCrypto.6.dylib"
        cp deps/xrootd/lib/libXrdCryptossl-6.so    "$TARGET_DIR/"
        
        # 3. 核心认证插件 (插件架构，so)
        cp deps/xrootd/lib/libXrdSeckrb5-6.so      "$TARGET_DIR/" || true
        cp deps/xrootd/lib/libXrdSecunix-6.so      "$TARGET_DIR/" || true
        cp deps/xrootd/lib/libXrdSecsss-6.so       "$TARGET_DIR/" || true
        cp deps/xrootd/lib/libXrdSecpwd-6.so       "$TARGET_DIR/" || true
        cp deps/xrootd/lib/libXrdSecztn-6.so       "$TARGET_DIR/" || true

        # macOS 对应的 patchelf --set-rpath '$ORIGIN' 是 install_name_tool 和 @loader_path
        # 同时遍历 .dylib 和 .so，修正修复 dylib 之间的相互引用路径
        for f in "$TARGET_DIR"/*.dylib "$TARGET_DIR"/*.so; do
          # 防御性判断，防止匹配不到文件时报错
          if [ ! -f "$f" ]; then continue; fi

          # 设置库本身的 ID
          install_name_tool -id "@loader_path/$(basename "$f")" "$f"
          # 确保 rpath 包含 @loader_path
          install_name_tool -add_rpath "@loader_path" "$f" 2>/dev/null || true
          
          # 将库内部引用的其他 XRootD 库的相对/绝对路径统一修改为 @loader_path
          otool -L "$f" | grep 'libXrd' | awk '{print $1}' | while read -r dep; do
            if [[ "$dep" != *"@loader_path"* && "$dep" != *"@rpath"* ]]; then
              dep_basename=$(basename "$dep")
              install_name_tool -change "$dep" "@loader_path/$dep_basename" "$f"
            fi
          done
        done

    - name: Install pnpm
      run: npm install -g pnpm@9

    - name: Strip packageManager field for CI
      run: |
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json'));
          delete pkg.packageManager;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "

    - name: Install NPM Dependencies & Build TypeScript
      run: pnpm install

    - name: Build Node Addon (node-gyp)
      continue-on-error: true
      run: |
        pnpm run build
        pnpm run pack

    - name: Upload Dist for Debugging
      uses: actions/upload-artifact@v6
      with:
        path: dist
        name: dist-macos-${{ matrix.arch }}

    - name: Upload Prebuilds for Debugging
      uses: actions/upload-artifact@v6
      with:
        path: prebuilds
        name: prebuilds-macos-${{ matrix.arch }}

    - name: Upload Package
      uses: actions/upload-artifact@v6
      with:
        path: packages
        name: node-addon-package-macos-${{ matrix.arch }}

    - name: Tree print package
      run: |
        cd packages
        for f in *.tgz; do tar -xvzf "$f"; done
        du -ah
    
    - name: Install XRootD Server for Testing (Linux)
      if: runner.os == 'Linux'
      run: |
        apt-get update
        apt-get install -y xrootd-server xrootd-client
    - name: Install XRootD Server for Testing (macOS)
      if: runner.os == 'macOS'
      run: |
        # macOS 物理机使用 Homebrew 安装
        brew install xrootd

    - name: Start XRootD Local Server
      run: |
        echo "Starting xrootd server on port 32874 at $(pwd)..."
        # 使用 nohup 在后台启动，并将日志重定向，防止阻塞 CI 主进程
        nohup xrootd -p 32874 $(pwd) > xrootd-server.log 2>&1 &
        
        # 等待几秒钟确保端口成功绑定
        sleep 10
        
        # 打印部分启动日志以确认状态
        cat xrootd-server.log | head -n 20
        
    - name: Run Tests
      run: |
        pnpm test:prepare
        pnpm test

    - name: Upload Server Logs on Failure
      # 仅在测试失败时上传 server 日志，方便排查是代码问题还是环境问题
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xrootd-server-log-${{ matrix.name }}-${{ matrix.arch }}
        path: xrootd-server.log
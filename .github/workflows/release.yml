name: Build Prebuilds & Publish to NPM

on:
  # 通常在打 Tag (例如 v0.1.6) 时触发发布
  push:
    tags:
      - 'v*'
  # 保留手动触发以备不时之需
  workflow_dispatch:

env:
  XROOTD_VERSION: "v6.0.1"
  CACHE_BATCH: "b1" # 更新这个值可以强制全局立即使缓存失效
  NODE_VERSION: "20"

jobs:
  # =========================================================
  # Linux 容器构建环境
  # =========================================================
  build-linux:
    name: Build Linux on ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    container:
      image: node:20-bullseye

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        
      - name: Install pnpm (Compatible with Node 20)
        run: npm install -g pnpm@9

      # ---------------- 依赖与缓存 ----------------
      - name: Install System Dependencies (Linux)
        run: |
          apt-get update
          apt-get install -y cmake g++ make patchelf

      - name: Cache XRootD Build
        id: cache-xrootd
        uses: actions/cache@v5
        with:
          path: deps/xrootd
          key: release-${{ matrix.platform }}-${{ matrix.arch }}-xrootd-${{ env.XROOTD_VERSION }}-dynamic-${{ env.CACHE_BATCH }}

      # ---------------- 编译 XRootD ----------------
      - name: Build XRootD (Linux)
        if: steps.cache-xrootd.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.XROOTD_VERSION }} https://github.com/xrootd/xrootd.git xrootd-src
          mkdir xrootd-src/build && cd xrootd-src/build/
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/deps/xrootd \
            -DXRDCL_ONLY=ON -DENABLE_SERVER=OFF -DENABLE_PYTHON=OFF \
            -DCMAKE_CXX_STANDARD=17 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=MinSizeRel -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          cmake --build . --parallel $(nproc)
          cmake --install .
          cd ../.. && rm -rf xrootd-src
          cd deps/xrootd/lib
          strip --strip-unneeded *.so

      # ---------------- 处理动态库 & Rpath ----------------
      - name: Copy & Patch dynamic libs (Linux)
        if: runner.os == 'Linux'
        run: |
          TARGET_DIR="libs/${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$TARGET_DIR"
          
          # 1. 核心库 (强依赖，缺失即报错)
          cp deps/xrootd/lib/libXrdCl.so.6.0.1     "$TARGET_DIR/libXrdCl.so.6"
          cp deps/xrootd/lib/libXrdUtils.so.6.0.1  "$TARGET_DIR/libXrdUtils.so.6"
          cp deps/xrootd/lib/libXrdXml.so.6.0.1    "$TARGET_DIR/libXrdXml.so.6"
          cp deps/xrootd/lib/libXrdCrypto.so.6.0.1 "$TARGET_DIR/libXrdCrypto.so.6"
          
          # 2. 安全与认证插件 (强制要求双端对齐，缺失即报错)
          cp deps/xrootd/lib/libXrdSec-6.so        "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecProt-6.so    "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdCryptossl-6.so  "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSeckrb5-6.so    "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecunix-6.so    "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecsss-6.so     "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecpwd-6.so     "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecztn-6.so     "$TARGET_DIR/"

          # 安全地批量 strip 和 patchelf
          for f in "$TARGET_DIR"/*; do
            if [ -f "$f" ]; then
              strip --strip-unneeded "$f"
              patchelf --set-rpath '$ORIGIN' "$f"
            fi
          done

      # ---------------- 编译 NPM 产物 ----------------
      - name: Install NPM Dependencies
        run: |
          # 动态清除 packageManager 以防止 CI 环境报错
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json'));delete pkg.packageManager;fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));"
          pnpm install

      - name: Build TypeScript & Native Addon
        run: pnpm run build

      # ---------------- 收集产物 ----------------
      - name: Upload libs payload
        uses: actions/upload-artifact@v6
        with:
          name: libs-${{ matrix.platform }}-${{ matrix.arch }}
          path: libs/${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 1

      - name: Upload prebuilds payload
        uses: actions/upload-artifact@v6
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 1

  # =========================================================
  # macOS 宿主机构建环境
  # =========================================================
  build-macos:
    name: Build macOS on ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@9

      # ---------------- 依赖与缓存 ----------------
      - name: Install System Dependencies (macOS)
        run: |
          brew update
          brew install cmake openssl@3

      - name: Cache XRootD Build
        id: cache-xrootd
        uses: actions/cache@v5
        with:
          path: deps/xrootd
          key: release-${{ matrix.platform }}-${{ matrix.arch }}-xrootd-${{ env.XROOTD_VERSION }}-dynamic-${{ env.CACHE_BATCH }}

      # ---------------- 编译 XRootD ----------------
      - name: Build XRootD (macOS)
        if: steps.cache-xrootd.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.XROOTD_VERSION }} https://github.com/xrootd/xrootd.git xrootd-src
          mkdir xrootd-src/build && cd xrootd-src/build/
          OPENSSL_ROOT=$(brew --prefix openssl@3)
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/deps/xrootd \
            -DXRDCL_ONLY=ON -DENABLE_SERVER=OFF -DENABLE_PYTHON=OFF \
            -DCMAKE_CXX_STANDARD=17 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_BUILD_TYPE=MinSizeRel -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DCMAKE_MACOSX_RPATH=ON -DCMAKE_INSTALL_RPATH="@loader_path"
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cmake --install .
          cd ../.. && rm -rf xrootd-src
          cd deps/xrootd/lib
          strip -x *.dylib *.so 2>/dev/null || true

      # ---------------- 处理动态库 & Rpath ----------------
      - name: Copy & Patch dynamic libs (macOS)
        run: |
          TARGET_DIR="libs/${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$TARGET_DIR"
          
          # 1. 核心库 (强依赖，去版本号拷贝)
          cp deps/xrootd/lib/libXrdCl.6.0.1.dylib      "$TARGET_DIR/libXrdCl.6.dylib"
          cp deps/xrootd/lib/libXrdUtils.6.0.1.dylib   "$TARGET_DIR/libXrdUtils.6.dylib"
          cp deps/xrootd/lib/libXrdXml.6.0.1.dylib     "$TARGET_DIR/libXrdXml.6.dylib"
          cp deps/xrootd/lib/libXrdCrypto.6.0.1.dylib  "$TARGET_DIR/libXrdCrypto.6.dylib"
          
          # 2. 安全与认证插件 (强制要求双端对齐，缺失即报错)
          cp deps/xrootd/lib/libXrdSec-6.so            "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecProt-6.so        "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdCryptossl-6.so      "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSeckrb5-6.so        "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecunix-6.so        "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecsss-6.so         "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecpwd-6.so         "$TARGET_DIR/"
          cp deps/xrootd/lib/libXrdSecztn-6.so         "$TARGET_DIR/"

          # 修正库的独立身份和相互引用路径
          for f in "$TARGET_DIR"/*; do
            if [ -f "$f" ]; then
              strip -x "$f"
              install_name_tool -id "@loader_path/$(basename "$f")" "$f"
              
              otool -L "$f" | grep 'libXrd' | awk '{print $1}' | while read -r dep; do
                if [[ "$dep" != *"@loader_path"* && "$dep" != *"@rpath"* ]]; then
                  dep_basename=$(basename "$dep")
                  install_name_tool -change "$dep" "@loader_path/$dep_basename" "$f"
                fi
              done
            fi
          done

      # ---------------- 编译 NPM 产物 ----------------
      - name: Install NPM Dependencies
        run: |
          # 动态清除 packageManager 以防止 CI 环境报错
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json'));delete pkg.packageManager;fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));"
          pnpm install

      - name: Build TypeScript & Native Addon
        run: pnpm run build

      # ---------------- 收集产物 ----------------
      - name: Upload libs payload
        uses: actions/upload-artifact@v6
        with:
          name: libs-${{ matrix.platform }}-${{ matrix.arch }}
          path: libs/${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 1

      - name: Upload prebuilds payload
        uses: actions/upload-artifact@v6
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 1


  # =========================================================
  # 发布任务：等待所有平台的构建完成，汇总所有架构的库文件并发布
  # =========================================================
  publish:
    name: Publish to NPM
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies & Build TS
        run: |
          pnpm install
          pnpm run build:ts
          pnpm run build:tsc

      # 下载所有 Matrix 构建出的动态库到 libs 目录
      - name: Download all libs artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: libs-*
          path: libs
          merge-multiple: true 

      # 下载所有 Matrix 构建出的原生节点到 prebuilds 目录
      - name: Download all prebuilds artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: prebuilds-*
          path: prebuilds
          merge-multiple: true

      - name: Verify Aggregated Files
        run: |
          echo "==== LIBS ===="
          ls -R libs/
          echo "==== PREBUILDS ===="
          ls -R prebuilds/

      - name: Publish to NPM
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
